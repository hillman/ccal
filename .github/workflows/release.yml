name: release

# Push a version tag → build the macOS (Apple Silicon) binaries and attach
# them to a public GitHub Release with anonymous download links.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# The binaries are unsigned: see the quarantine note in the release body.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the Release and upload assets

jobs:
  macos:
    name: build & release (aarch64-apple-darwin)
    # macos-14 runners are Apple Silicon, so the default host target already
    # is aarch64-apple-darwin — no cross-compilation needed.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --locked --bins

      - name: Package
        id: package
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          name="ccal-${tag}-aarch64-apple-darwin"
          mkdir -p "dist/${name}"
          cp target/release/ccal target/release/ccal-server target/release/import-bear "dist/${name}/"
          cp README.md "dist/${name}/" 2>/dev/null || true
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" | tee "dist/${name}.tar.gz.sha256"
          echo "tarball=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}
          fail_on_unmatched_files: true
          body: |
            macOS (Apple Silicon / aarch64) build of `ccal`, `ccal-server`, `import-bear`.

            **These binaries are unsigned.** macOS will quarantine them on
            first run ("cannot be opened because the developer cannot be
            verified"). After downloading and extracting:

            ```sh
            xattr -d com.apple.quarantine ccal ccal-server import-bear
            ```

            (or right-click each binary in Finder → Open → Open once).

            Verify the download:

            ```sh
            shasum -a 256 -c ccal-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz.sha256
            ```
