name: release

# Two ways to run:
#   1. Push a version tag → publish a public GitHub Release.
#        git tag v0.1.0 && git push origin v0.1.0
#   2. Actions tab → "release" → "Run workflow" (manual / workflow_dispatch):
#        - leave "tag" empty   → just build, upload run artifacts (no Release)
#        - set  "tag" e.g. v0.1.0 → build AND publish that Release/tag
#
# Builds macOS (Apple Silicon) and Linux (x86_64) binaries — one matrix leg
# per platform, both native (no cross-compilation), both uploading to the
# same Release/run.
#
# The binaries are unsigned: see the quarantine note in the release body.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create & publish (empty = build artifacts only, no Release)"
        required: false
        default: ""

permissions:
  contents: write # needed to create the Release and upload assets

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 is Apple Silicon; ubuntu-latest is x86_64 — so each
          # leg's host target is the one we want, no cross-compilation.
          - os: macos-14
            target: aarch64-apple-darwin
            label: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Resolve version & mode
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"; publish=true
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            version="${{ github.event.inputs.tag }}"; publish=true
          else
            version="manual-$(git rev-parse --short HEAD)"; publish=false
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "Building ${version} for ${{ matrix.label }} (publish release: ${publish})"

      - name: Build release binaries
        run: cargo build --release --locked --bins

      - name: Package
        id: package
        run: |
          set -euo pipefail
          name="ccal-${{ steps.meta.outputs.version }}-${{ matrix.label }}"
          mkdir -p "dist/${name}"
          cp target/release/ccal target/release/ccal-server target/release/import-bear "dist/${name}/"
          cp README.md "dist/${name}/" 2>/dev/null || true
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" | tee "dist/${name}.tar.gz.sha256"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "tarball=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      # Tag push, or manual run with a tag supplied → public Release. Both
      # matrix legs target the same tag; the action creates it once and
      # appends each platform's assets.
      - name: Create / update GitHub Release
        if: steps.meta.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          files: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}
          fail_on_unmatched_files: true
          body: |
            macOS (Apple Silicon / `aarch64-apple-darwin`) and Linux
            (`x86_64-unknown-linux-gnu`) builds of `ccal`, `ccal-server`,
            `import-bear`. Pick the tarball for your platform.

            **The macOS binaries are unsigned.** macOS will quarantine them
            on first run ("cannot be opened because the developer cannot be
            verified"). After downloading and extracting:

            ```sh
            xattr -d com.apple.quarantine ccal ccal-server import-bear
            ```

            (or right-click each binary in Finder → Open → Open once).

            Verify a download:

            ```sh
            shasum -a 256 -c <file>.tar.gz.sha256
            ```

      # Manual run with no tag → downloadable build artifacts (login
      # required, expires; good for testing the build without a Release).
      - name: Upload build artifact
        if: steps.meta.outputs.publish != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.name }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
